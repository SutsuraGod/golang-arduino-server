services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
     - "3000:3000"
    volumes:
     - grafana_data:/var/lib/grafana
    env_file:
      - .env

volumes:
  pgdata:
  grafana_data:

